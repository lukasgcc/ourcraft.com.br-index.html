<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <title>OurCraft - Site Oficial</title>
    <style>
        :root {
            --bg-nav: #181818;
            --bg-body: #0f0f11;
            --sovieth-red: #cc1b1e;
            --sovieth-gold: #f1b80c;
            --sovieth-gold-hover: #d19f04;
            --text-light: #f5f5f5;
            --text-muted: #88888c;
            --mc-green: #478924;
            --mc-green-hover: #3b6e1f;
            --github-color: #24292e;
            --linkedin-color: #0077b5;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-light);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        nav {
            background-color: var(--bg-nav);
            border-bottom: 3px solid var(--sovieth-gold);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 80px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .logo img {
            height: 45px;
            display: block;
        }

        .menu-links {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .menu-item {
            position: relative;
            display: inline-block;
        }

        .menu-item > a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 0;
            transition: color 0.2s;
        }

        .menu-item > a:hover {
            color: var(--sovieth-gold);
        }

        .arrow-down {
            border: solid var(--text-light);
            border-width: 0 2px 2px 0;
            display: inline-block;
            padding: 3px;
            transform: rotate(45deg);
            transition: border-color 0.2s;
        }

        .menu-item:hover .arrow-down {
            border-color: var(--sovieth-gold);
        }

        .dropdown-box {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--bg-nav);
            border: 2px solid var(--sovieth-gold);
            border-top: none;
            min-width: 220px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
        }

        .menu-item:hover .dropdown-box {
            display: block;
        }

        .dropdown-box a {
            color: var(--text-light);
            text-decoration: none;
            display: block;
            padding: 14px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            border-bottom: 1px solid #282828;
            transition: background-color 0.2s, color 0.2s;
        }

        .dropdown-box a:last-child {
            border-bottom: none;
        }

        .dropdown-box a:hover {
            background-color: var(--sovieth-red);
            color: #fff;
        }

        .dropdown-box .muted-link {
            color: var(--text-muted);
            pointer-events: none;
            background-color: rgba(0, 0, 0, 0.2);
        }

        .dropdown-box .small-status {
            display: block;
            font-size: 0.7rem;
            color: #ff6b6b;
            text-transform: lowercase;
            margin-top: 3px;
            font-style: italic;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-nav {
            text-decoration: none;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.4);
        }

        .btn-nav:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-github {
            background-color: var(--github-color);
            border: 2px solid #444;
        }

        .btn-linkedin {
            background-color: var(--linkedin-color);
            border: 2px solid #005990;
        }

        .btn-nav svg {
            width: 16px;
            height: 16px;
            fill: #fff;
            flex-shrink: 0;
        }

        .hero-section {
            position: relative;
            width: 100%;
            height: calc(100vh - 80px);
            min-height: 550px;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), url('/images/favicon.png') no-repeat;
            background-size: cover;
            background-position: center 62%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 40px;
        }

        .hero-wrapper {
            max-width: 1200px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-panel-left {
            background-color: rgba(24, 24, 24, 0.95);
            border: 3px solid var(--sovieth-gold);
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 12px 42px rgba(0, 0, 0, 0.8);
            box-sizing: border-box;
            text-align: center;
        }

        .hero-panel-left h2 {
            font-size: 2.3rem;
            font-weight: 900;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            color: #fff;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .arrows-indicator {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .arrow-item {
            color: var(--sovieth-red);
            font-size: 2.2rem;
            font-weight: bold;
            display: inline-block;
            animation: bounceIndicator 1.5s infinite ease-in-out;
        }

        .arrow-item:nth-child(1) { animation-delay: 0s; }
        .arrow-item:nth-child(2) { animation-delay: 0.15s; }
        .arrow-item:nth-child(3) { animation-delay: 0.3s; }
        .arrow-item:nth-child(4) { animation-delay: 0.45s; }
        .arrow-item:nth-child(5) { animation-delay: 0.6s; }

        @keyframes bounceIndicator {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(8px); }
        }

        .ip-connect-btn {
            display: block;
            width: 100%;
            background-color: var(--sovieth-red);
            border: none;
            border-bottom: 5px solid #8a0f11;
            color: #fff;
            padding: 20px;
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            text-align: center;
            transition: background-color 0.2s;
            box-sizing: border-box;
        }

        .ip-connect-btn:hover {
            background-color: #e62226;
        }

        .ip-connect-btn:active {
            border-bottom-width: 1px;
            transform: translateY(4px);
        }

        .thin-strip-footer {
            background-color: #09090b;
            border-top: 1px solid #1c1c21;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .strip-text-left {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
            letter-spacing: 0.5px;
        }

        .strip-text-right {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
        }

        .strip-text-right span {
            color: var(--sovieth-gold);
        }

        .scroll-spacer {
            height: 25vh;
        }

        .easter-egg-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            box-sizing: border-box;
            background: linear-gradient(to bottom, var(--bg-body) 0%, #050506 100%);
        }

        .cat-gif-box {
            margin-bottom: 30px;
        }

        .cat-gif-box img {
            max-width: 400px;
            width: 100%;
            height: auto;
            border-radius: 16px;
            border: 4px solid var(--sovieth-gold);
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.25);
        }

        .obrigado-title {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, var(--sovieth-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .final-fade-msg {
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--sovieth-red);
            margin-top: 25px;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            text-shadow: 0 2px 10px rgba(204, 27, 30, 0.4);
        }

        .final-fade-msg.visible {
            opacity: 1;
        }

        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        @media (max-width: 992px) {
            nav { padding: 0 20px; }
            .nav-left { gap: 20px; }
            .menu-links { display: none; }
            .hero-panel-left h2 { font-size: 1.8rem; }
            .hero-section { height: auto; padding: 60px 20px; }
        }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <nav>
        <div class="nav-left">
            <div class="logo">
                <img src="/images/logoOurcraft.png" alt="OurCraft">
            </div>
            <div class="menu-links">
                <div class="menu-item">
                    <a href="#">Painel <span class="arrow-down"></span></a>
                    <div class="dropdown-box">
                        <a href="https://painel.ourcraft.com.br" target="_blank">Crafty Controller</a>
                        <a href="https://painel.ourcraft.com.br/status" target="_blank">Status</a>
                        <a href="https://painel.ourcraft.com.br/api/status" target="_blank">API Status</a>

                </div>
                <div class="menu-item">

                    <div class="dropdown-box">

                    </div>
                </div>
                <div class="menu-item">
                    <a href="#">Outros <span class="arrow-down"></span></a>
                    <div class="dropdown-box">
                        <a href="https://mapa.ourcraft.com.br/" target="_blank">Mapa</a>
                        <a href="#" class="muted-link">Plugins<span class="small-status">(em manutenção)</span></a>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-right">
            <a href="https://github.com/lukasgcc" target="_blank" class="btn-nav btn-github">
                <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>

            <a href="https://www.linkedin.com/in/lucasgccruz/" target="_blank" class="btn-nav btn-linkedin">
                <svg viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>

            </a>

    </nav>

    <section class="hero-section">
        <div class="hero-wrapper">
            <div class="hero-panel-left">
                <h2>Entre agora no Servidor!</h2>
                <div class="arrows-indicator">
                    <span class="arrow-item">⬇</span>
                    <span class="arrow-item">⬇</span>
                    <span class="arrow-item">⬇</span>
                    <span class="arrow-item">⬇</span>
                    <span class="arrow-item">⬇</span>
                </div>
                <button class="ip-connect-btn" onclick="navigator.clipboard.writeText('mc.ourcraft.com.br'); alert('IP copiado com sucesso!');">mc.ourcraft.com.br</button>
            </div>
        </div>

    <div class="thin-strip-footer">
        <div class="strip-text-left">é serio, acessa lá.</div>
        <div class="strip-text-right">by: <span>@olucascomk</span></div>
    </div>

    <div class="scroll-spacer"></div>

    <section class="easter-egg-section">
        <div class="cat-gif-box">
            <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExbDc2azB3ZmdkMjk0MXM5cmdwcmdjeHBneXMzbjA0bjVvdjF2anBobiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/93mS3A87wfmOySC29W/giphy.gif" alt="Obrigado">
        </div>
        <h3 class="obrigado-title">Obrigado!</h3>
        <div id="hiddenMessage" class="final-fade-msg">Aguardo você no servidor!</div>
    </section>

    <script>
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        const hiddenMessage = document.getElementById('hiddenMessage');
        
        let fireworks = [];
        let particles = [];
        let running = false;

        const colorPalette = ['#9b59b6', '#e91e63', '#2ecc71', '#f1c40f', '#3498db', '#e74c3c'];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.targetY = Math.random() * (canvas.height * 0.5);
                this.speed = 8 + Math.random() * 5;
                this.color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            }
            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY) {
                    this.explode();
                    return false;
                }
                return true;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 3, 3);
            }
            explode() {
                let count = 50 + Math.floor(Math.random() * 40);
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle(this.x, this.y, this.color));
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                let angle = Math.random() * Math.PI * 2;
                let speed = 1 + Math.random() * 6;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.fade = 0.012 + Math.random() * 0.018;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
                this.alpha -= this.fade;
                return this.alpha > 0;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 2.5, 2.5);
                ctx.restore();
            }
        }

        function animLoop() {
            if (!running) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.08) {
                fireworks.push(new Firework());
            }

            fireworks = fireworks.filter(f => {
                f.draw();
                return f.update();
            });

            particles = particles.filter(p => {
                p.draw();
                return p.update();
            });

            requestAnimationFrame(animLoop);
        }

        window.addEventListener('scroll', () => {
            const totalHeight = document.documentElement.scrollHeight - window.innerHeight;
            const currentScroll = window.scrollY;

            if (currentScroll >= totalHeight - 5) {
                if (!hiddenMessage.classList.contains('visible')) {
                    hiddenMessage.classList.add('visible');
                }
                if (!running) {
                    running = true;
                    animLoop();
                }
            } else {
                if (running) {
                    running = false;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    fireworks = [];
                    particles = [];
                }
            }
        });
    </script>
</body>
</html>
